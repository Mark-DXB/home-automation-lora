substitutions:
  name: "lora-receiver"
  friendly_name: "LoRa Receiver Node"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 1000
    then:
      - output.turn_on: vext_power

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

output:
  - platform: gpio
    pin: GPIO36
    id: vext_power
    inverted: true

i2c:
  sda: GPIO17
  scl: GPIO18

font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 20
  - file: "gfonts://Roboto"
    id: font_small
    size: 12

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      // Print Remote Sensor Data
      if (id(remote_uptime).has_state()) {
        it.printf(0, 0, id(font_large), "Data: %.0f", id(remote_uptime).state);
        
        // Print Time Since Last Received
        uint32_t now = millis() / 1000;
        uint32_t seconds_ago = now - id(last_heard);
        it.printf(0, 24, id(font_small), "Last seen: %d sec ago", seconds_ago);
      } else {
        it.print(0, 0, id(font_large), "Waiting for LoRa...");
      }

      // Print Local IP Address
      if (id(ip_address).has_state()) {
        it.printf(0, 40, id(font_small), "IP: %s", id(ip_address).state.c_str());
      }
      
      // Print Local WiFi Signal Strength
      if (id(local_wifi_signal).has_state()) {
        it.printf(0, 52, id(font_small), "WiFi: %.0f dBm", id(local_wifi_signal).state);
      }

spi:
  clk_pin: GPIO9
  mosi_pin: GPIO10
  miso_pin: GPIO11

# The Radio Hardware
sx126x:
  id: lora_radio
  cs_pin: GPIO8
  rst_pin: GPIO12
  busy_pin: GPIO13
  dio1_pin: GPIO14
  hw_version: sx1262
  modulation: LORA
  frequency: 868MHz
  bandwidth: 125_0kHz
  spreading_factor: 7
  coding_rate: CR_4_5
  rf_switch: true
  tcxo_voltage: 1_8V
  tcxo_delay: 5ms

# Use the radio to receive packets
packet_transport:
  platform: sx126x
  sx126x_id: lora_radio

globals:
  - id: last_heard
    type: uint32_t
    initial_value: '0'

text_sensor:
  - platform: wifi_info
    ip_address:
      id: ip_address
      internal: true

sensor:
  - platform: wifi_signal
    id: local_wifi_signal
    internal: true

  # Catch the sensor data coming from the Sender's node name
  - platform: packet_transport
    name: "Remote Node Uptime"
    provider: "lora-sender"
    remote_id: "uptime_sensor"
    id: remote_uptime
    internal: false
    on_value:
      - globals.set:
          id: last_heard
          value: !lambda "return millis() / 1000;"
