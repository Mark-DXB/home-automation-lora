substitutions:
  name: "lora-sender"
  friendly_name: "LoRa Sender Node"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 1000
    then:
      - lambda: |-
          // 1. Hard power the OLED via VEXT
          pinMode(36, OUTPUT);
          digitalWrite(36, LOW);
          delay(100);
          
          // 2. Hard Reset the OLED controller
          pinMode(21, OUTPUT);
          digitalWrite(21, LOW);
          delay(50);
          digitalWrite(21, HIGH);
          delay(100);

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

esp32_ble_tracker:

i2c:
  sda: GPIO17
  scl: GPIO18
  frequency: 400kHz
  scan: true



font:
  - file: "gfonts://Roboto"
    id: font1
    size: 20

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    lambda: |-
      // Only draw to the screen if the Receiver tells us to over LoRa
      if (id(receiver_oled_command).state) {
        it.print(0, 0, id(font1), "Sender Active");
        
        // Print the uptime just so there is something moving
        it.printf(0, 20, id(font1), "Up: %.0fs", id(uptime_sensor).state);

        if (id(receiver_rssi).has_state()) {
          it.printf(0, 40, id(font1), "RSSI: %.0f dBm", id(receiver_rssi).state);
        } else {
          it.print(0, 40, id(font1), "Waiting for Reply...");
        }
      }

spi:
  clk_pin: GPIO9
  mosi_pin: GPIO10
  miso_pin: GPIO11

# The Radio Hardware
sx126x:
  id: lora_radio
  cs_pin: GPIO8
  rst_pin: GPIO12
  busy_pin: GPIO13
  dio1_pin: GPIO14
  hw_version: sx1262
  modulation: LORA
  frequency: 868MHz
  bandwidth: 125_0kHz
  spreading_factor: 7
  coding_rate: CR_4_5
  rf_switch: true
  tcxo_voltage: 1_8V
  tcxo_delay: 5ms

# Automatically broadcast our sensors over LoRa
packet_transport:
  platform: sx126x
  sx126x_id: lora_radio
  sensors:
    - uptime_sensor
    - inkbird_temperature
    - inkbird_battery

sensor:
  - platform: uptime
    id: uptime_sensor
    update_interval: 10s

  - platform: inkbird_ibsth1_mini
    mac_address: "49:24:06:18:05:7C"
    temperature:
      name: "Inkbird Temperature"
      id: inkbird_temperature
    battery_level:
      name: "Inkbird Battery"
      id: inkbird_battery

  - platform: packet_transport
    name: "Receiver RSSI"
    provider: "lora-receiver"
    remote_id: "lora_rssi"
    id: receiver_rssi
    internal: true

binary_sensor:
  - platform: packet_transport
    name: "Receiver OLED Command"
    provider: "lora-receiver"
    remote_id: "lora_oled_state"
    id: receiver_oled_command
    internal: true
